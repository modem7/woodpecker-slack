when:
  - event: push
    branch: master
  - event: pull_request

steps:
  lint-and-build:
    image: golang:1.26
    pull: true
    environment:
      CGO_ENABLED: 0
      GOOS: "linux"
      GOARCH: "amd64"
    commands:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - golangci-lint version
      - golangci-lint run
      - go build -a -tags netgo -ldflags '-w' .

  #test:
  #  image: golang:1.21
  #  commands:
  #    - go test -cover ./...

  publish:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      repo: gowerstreet/slack
      tags:
        - latest
        - "${CI_PIPELINE_NUMBER}"
      platforms:
        - linux/amd64
    when:
      event: push
      branch: master

  # Webhook URLs come from the server's WOODPECKER_ENVIRONMENT
  # (SLACK_WEBHOOK_NOTICE / SLACK_WEBHOOK_ALERTS). The plugin routes failures
  # itself: pull-request failures go to notice, default-branch failures to alerts.
  slack-failure:
    image: gowerstreet/slack:latest
    pull: true
    settings:
      status: failure
      description: "Slack plugin for Woodpecker"
    when:
      status: failure

  slack-release:
    image: gowerstreet/slack:${CI_PIPELINE_NUMBER}
    settings:
      status: success
      description: "Slack plugin for Woodpecker"
    when:
      event: push
      branch: master
      status: success
